name: Static Analysis (Reviewdog)

on:
  pull_request:
    branches: [ main ]

permissions:
  contents: read
  pull-requests: write

jobs:
  static-analysis:
    name: runner / static-analysis
    runs-on: ubuntu-latest
    steps:
      - name: Checkout Repo
        uses: actions/checkout@11bd71901bbe5b1630ceea73d27597364c9af683 # v4.2.2

      - name: Set up Python
        uses: actions/setup-python@0b93645e9fa0c42467fd64c1b72b5c0b68e5760a # v5.3.0
        with:
          python-version: "3.12"

      - name: Install uv and dependencies
        run: |
          curl -LsSf https://astral.sh/uv/install.sh | sh
          uv sync --all-extras

      # Ruff Reviewdog Check
      - name: Run Ruff Check
        uses: benny123tw/action-ruff@2fc3414c14e36f582cd99a8d0e79d1bd7221daaf # v1.1.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning

      # Mypy Reviewdog Check
      - name: Run Mypy Check
        uses: tsuyoshicho/action-mypy@cd07ac18ac721066394ac97f5311d233c669a464 # v1.2.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning

      # Frontend Setup
      - name: Set up Node.js
        uses: actions/setup-node@39370e3970a6d050c480ffad4ff0ed4d3fdee5af # v4.1.0
        with:
          node-version: "20"
          cache: "npm"
          cache-dependency-path: frontend/package-lock.json

      - name: Install Frontend deps
        run: npm ci
        working-directory: frontend

      # ESLint Reviewdog Check
      - name: Run ESLint Check
        uses: reviewdog/action-eslint@556a3fdaf8b4201d4d74d406013386aa4f7dab96 # v1.20.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          workdir: frontend

      # TypeScript compiler Reviewdog Check
      - name: Run tsc Check
        uses: EPMatt/reviewdog-action-tsc@2e54ea9849a0f5578f00d95edd8d3b88e0b89732 # v1.5.0
        with:
          github_token: ${{ secrets.GITHUB_TOKEN }}
          reporter: github-pr-review
          level: warning
          workdir: frontend
