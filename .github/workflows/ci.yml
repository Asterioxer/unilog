name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Quality Gates (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: true

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up astral/uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Project and Dependencies
        run: |
          uv sync --all-extras

      - name: Run Linting Checks (Ruff)
        run: |
          uv run ruff check .

      - name: Run Type Checks (Mypy)
        run: |
          uv run mypy unilog api

      - name: Run Test Suite & Coverage (Pytest)
        run: |
          uv run pytest --cov=unilog --cov=api --cov-report=term-missing

      - name: Verify Docker Image Build
        run: |
          docker build -t unilog-api .
