name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  test:
    name: Run Quality Gates (Python ${{ matrix.python-version }})
    runs-on: ubuntu-latest
    strategy:
      matrix:
        python-version: ["3.10", "3.11", "3.12"]
      fail-fast: true

    permissions:
      contents: read
      pull-requests: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up astral/uv
        uses: astral-sh/setup-uv@v3
        with:
          version: "latest"

      - name: Set up Python ${{ matrix.python-version }}
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}

      - name: Install Project and Dependencies
        run: |
          uv sync --all-extras

      - name: Run Linting Checks (Ruff)
        run: |
          uv run ruff check .

      - name: Run Dependency Audit (pip-audit)
        if: matrix.python-version == '3.12'
        continue-on-error: true
        run: |
          uv run pip-audit

      - name: Run Type Checks (Mypy)
        run: |
          uv run mypy unilog api

      - name: Run Test Suite & Coverage (Pytest)
        run: |
          uv run pytest --cov=unilog --cov=api --cov-report=xml --cov-report=term-missing

      - name: Pytest Coverage Comment
        uses: MishaKav/pytest-coverage-comment@main
        if: github.event_name == 'pull_request' && matrix.python-version == '3.12'
        with:
          pytest-xml-coverage-path: ./coverage.xml
          title: Code Coverage Summary
          badge-title: Coverage
          hide-comment: false
          create-new-comment: false

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 20
          cache: 'npm'
          cache-dependency-path: 'frontend/package-lock.json'

      - name: Install Frontend Dependencies
        run: |
          npm install -g npm@11.6.2
          cd frontend
          npm ci

      - name: Run Frontend Lint (ESLint)
        run: |
          cd frontend
          npm run lint

      - name: Run Frontend Tests (Vitest)
        run: |
          cd frontend
          npm run test:cov

      - name: Verify Frontend Production Build
        run: |
          cd frontend
          npm run build

      - name: Verify Docker Image Build
        run: |
          docker build -t unilog-api .

      - name: Verify Container Startup (Smoke Test)
        run: |
          docker run -d --name unilog-container -p 8000:8000 unilog-api
          for i in {1..15}; do
            if curl -s http://localhost:8000/health | grep -q "healthy"; then
              echo "Smoke test passed successfully!"
              docker stop unilog-container
              docker rm unilog-container
              exit 0
            fi
            echo "Waiting for container to start..."
            sleep 1
          done
          echo "Error: Container failed to start or health check did not pass."
          docker logs unilog-container
          docker stop unilog-container
          docker rm unilog-container
          exit 1

  dependency-review:
    name: Dependency Review
    runs-on: ubuntu-latest
    if: github.event_name == 'pull_request'
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      - name: Dependency Review
        uses: actions/dependency-review-action@v4

