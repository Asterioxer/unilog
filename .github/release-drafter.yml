name-template: 'v$RESOLVED_VERSION'
tag-template: 'v$RESOLVED_VERSION'
categories:
  - title: '🚀 Features'
    labels:
      - 'feature'
      - 'enhancement'
      - 'feat'
  - title: '🐛 Bug Fixes'
    labels:
      - 'bug'
      - 'fix'
      - 'bugfix'
  - title: '🔒 Security Hardening'
    labels:
      - 'security'
  - title: '⚙️ CI/CD & DevEx'
    labels:
      - 'ci'
      - 'devex'
      - 'refactor'
  - title: '📖 Documentation'
    labels:
      - 'docs'
      - 'documentation'
change-template: '- $TITLE (#$NUMBER) by @$AUTHOR'
template: |
  ## What's Changed

  $CHANGES
