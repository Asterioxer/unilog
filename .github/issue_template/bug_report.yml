name: 🐛 Bug Report
description: Report a bug to help improve unilog
labels: ["bug"]
body:
  - type: markdown
    attributes:
      value: |
        Thank you for reporting a bug! Please fill out the form below with as much detail as possible to help us identify and resolve the issue.

  - type: textarea
    id: description
    attributes:
      label: Bug Description
      description: A clear and concise description of what the bug is.
      placeholder: Describe the unexpected behavior...
    validations:
      required: true

  - type: textarea
    id: steps
    attributes:
      label: Steps to Reproduce
      description: Explain how we can reproduce this issue. Include log snippets if applicable.
      placeholder: |
        1. Call unilog.parse(...) with input '...'
        2. Run CLI command '...'
        3. See error
    validations:
      required: true

  - type: textarea
    id: expected-actual
    attributes:
      label: Expected vs Actual Behavior
      description: What did you expect to happen, and what actually happened?
      placeholder: |
        Expected: ...
        Actual: ...
    validations:
      required: true

  - type: input
    id: environment
    attributes:
      label: Environment Info
      description: Operating System, Python version, Node/React version, and unilog version.
      placeholder: e.g. Windows 11, Python 3.12, unilog v0.3.3
    validations:
      required: true

  - type: textarea
    id: logs
    attributes:
      label: Log Snippets & Exception Traces
      description: Copy and paste command line output or traceback logs.
      render: python
